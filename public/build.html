<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Memory Machine</title>
  <link rel="icon" type="image/png" href="/assets/icon.png"> 
  <link rel="stylesheet" href="build.css">
</head>
<body>
  <div id = "form-screen" class="create-container">
    <h2>Add Some Memories!</h2>

    <form id="memoryForm" enctype="multipart/form-data">
      <label>
        Date:
        <input type="date" name="date" required>
      </label>

      <label>
        Story (Max 100 words):
        <textarea name="story" rows="4" required></textarea>
      </label>

      <label>
        Upload Photo:
        <input id = "pic_upload" type="file" name="image" accept="image/*" required>
      </label>

      <button type="submit" class="save-btn">Save Memory</button>
    </form>

    <div class="next-actions">
      <button id="finishMachine" style = "display: none;">Finish & Get Code</button>
    </div>

  </div>

  <div id = "loading-screen" style="display: none;">Setting up your claw machine!</div>
  <script src="firebase-config.js"></script>
  <script type="module" src="build.js"></script>
</body>
</html>
