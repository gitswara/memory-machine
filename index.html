<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claw Machine</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="/images/favicon.png"> 
</head>
<body>

    <div class="game-container">
    <img src="assets/machine.png" class="claw-machine" alt="Claw Machine">
    <img src="assets/static_balls.png" class="static-balls" alt="Static Balls">
    <img src = "assets/button0.png" class="drop-button" id = "dropBtn" alt="Drop Button">
    <img src = "assets/claw0.png" class="claw" id = "claw" alt="Claw">
    <img src = "assets/blue_ball.png" class="ball" id="blue-ball">
    <img src = "assets/red_ball.png" class="ball" id="red-ball">
    <img src = "assets/green_ball.png" class="ball" id="green-ball">
    <img src = "assets/yellow_ball.png" class="ball" id="yellow-ball">
    <img src = "assets/play0_cropped.png" class = "play-button" id="playBtn" class="play-button"></div>
    <audio id="playSound" src="assets/play-sound.mp3"></audio>

    <img src="assets/red_ball.png" id="gift-red-ball" class="gift-ball" style="display: none; left: 50px; top: 360px;">
    <img src="assets/blue_ball.png" id="gift-blue-ball" class="gift-ball" style="display: none; left: 100px; top: 360px;">
    <img src="assets/green_ball.png" id="gift-green-ball" class="gift-ball" style="display: none; left: 150px; top: 360px;">
    <img src="assets/yellow_ball.png" id="gift-yellow-ball" class="gift-ball" style="display: none; left: 200px; top: 360px;">

    </div>

    <script src="script.js"></script>
</body>
</html>
